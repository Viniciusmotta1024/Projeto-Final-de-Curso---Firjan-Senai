<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Controle de Tarefas</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Controle de Tarefas</h1>

<section class="form">

<h2>Nova Tarefa</h2>

<input type="text" id="titulo" placeholder="Título da tarefa">

<textarea id="descricao" placeholder="Descrição da tarefa"></textarea>

<select id="prioridade">
<option value="">Prioridade</option>
<option value="BAIXA">Baixa</option>
<option value="MEDIA">Média</option>
<option value="ALTA">Alta</option>
</select>

<input type="date" id="dataLimite">

<button class="criar" onclick="criarTarefa()">Criar Tarefa</button>

</section>

<section class="lista">

<h2>Tarefas</h2>

<button class="atualizar" onclick="listarTarefas()">Atualizar Lista</button>

<div id="tarefas"></div>

</section>

</div>

<div id="popup" class="popup hidden">
<span id="popup-msg"></span>
</div>

<script src="script.js"></script>

</body>
</html>
